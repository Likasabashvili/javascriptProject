<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HotelBook - საუკეთესო სასტუმროები საქართველოში</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" type="image" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="flex">
        <div class="container header-inner">
          <a class="logo" href="index.html">HotelBook</a>
          <button class="burger" id="burger-btn">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav class="main-nav" id="main-nav">
            <a href="index.html">მთავარი</a>
            <a href="hotels.html">სასტუმროები</a>
            <a href="rooms.html">ოთახები</a>
            <a href="booked.html">დაჯავშნილი</a>
            <a href="help.html">დახმარება</a>
          </nav>
          <script>
            // ბურგერ მენიუ - ელემენტები ნაშთია დაიმედიდეს
            document.addEventListener("DOMContentLoaded", () => {
              const burger = document.getElementById("burger-btn");
              const nav = document.getElementById("main-nav");

              if (burger && nav) {
                burger.addEventListener("click", () => {
                  console.log("🔘 Burger menu clicked");
                  nav.classList.toggle("active");
                });
              }
            });
          </script>
        </div>
        <div class="autorization" id="auth-buttons">
          <a href="login.html" class="btn">შესვლა</a>
          <a href="register.html" class="btn btn-primary">რეგისტრაცია</a>
        </div>
        <div class="welcome" id="welcome-header" style="display: none">
          <span id="welcome-name"></span>
          <button id="logout-btn" class="btn logout">გასვლა</button>
        </div>
      </div>
    </header>
    <main>
      <div class="container" style="margin-top: 30px">
        <select id="city-filter" class="city-select"></select>
      </div>
      <section class="sastumroebi-mtavari">
        <div class="container" id="hotels-list"></div>
      </section>
    </main>

    <script src="app.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 HotelBook — სტუდენტური პროექტი - ლიკა საბაშვილი</p>
      </div>
    </footer>
  </body>
</html>
