<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HotelBook - საუკეთესო სასტუმროები საქართველოში</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" type="image" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
    <link rel="stylesheet" href="booking.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="flex">
        <div class="container header-inner">
          <a class="logo" href="index.html">HotelBook</a>
          <button class="burger" id="burger-btn">
            <span></span>
            <span></span>
            <span></span>
          </button>
          <nav class="main-nav" id="main-nav">
            <script>
              document.addEventListener("DOMContentLoaded", () => {
                const burger = document.getElementById("burger-btn");
                const nav = document.getElementById("main-nav");
                if (burger && nav) {
                  burger.addEventListener("click", () => {
                    nav.classList.toggle("active");
                  });
                }
              });
            </script>
            <a href="index.html">მთავარი</a>
            <a href="hotels.html">სასტუმროები</a>
            <a href="rooms.html">ოთახები</a>
            <a href="booked.html">დაჯავშნილი</a>
            <a href="help.html">დახმარება</a>
          </nav>
        </div>
        <div class="autorization" id="auth-buttons">
          <a href="login.html" class="btn">შესვლა</a>
          <a href="register.html" class="btn btn-primary">რეგისტრაცია</a>
        </div>
        <div class="welcome" id="welcome-header" style="display: none">
          <span id="welcome-name"></span>
          <button id="logout-btn" class="btn logout">გასვლა</button>
        </div>
      </div>
    </header>
    <div class="container booking-container">
      <div class="booking-wrapper">
        <!-- მარცხენა მხარე - ფოტო -->
        <div class="booking-image">
          <img id="roomImage" src="" alt="Room Image" />
        </div>

        <!-- მარჯვენა მხარე - ფორმა -->
        <div class="booking-form">
          <h2 id="roomTitle"></h2>
          <p id="roomPrice"></p>

          <form id="bookingForm">
            <input
              type="text"
              id="customerName"
              placeholder="თქვენი სახელი"
              required
            />
            <input
              type="tel"
              id="customerPhone"
              placeholder="ტელეფონის ნომერი"
              required
            />

            <label>Check-in</label>
            <input type="date" id="checkIn" required />

            <label>Check-out</label>
            <input type="date" id="checkOut" required />

            <button type="submit" class="btn btn-primary">დაჯავშნა</button>
          </form>
        </div>
      </div>
    </div>
    <footer class="site-footer">
      <div class="container">
        <p>© 2026 HotelBook — სტუდენტური პროექტი - ლიკა საბაშვილი</p>
      </div>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="booking.js"></script>
    <script src="app.js"></script>
  </body>
</html>
