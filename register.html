<!doctype html>
<html lang="ka">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HotelBook - საუკეთესო სასტუმროები საქართველოში</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" type="image" href="favicon.png" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="auth.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="flex">
        <div class="container header-inner">
          <a class="logo" href="index.html">HotelBook</a>
          <nav class="main-nav">
            <a href="index.html">მთავარი</a>
            <a href="hotels.html">სასტუმროები</a>
            <a href="rooms.html">ოთახები</a>
            <a href="booked.html">დაჯავშნილი</a>
            <a href="help.html">დახმარება</a>
          </nav>
        </div>
        <div class="autorization" id="auth-buttons">
          <a href="login.html" class="btn">შესვლა</a>
          <a href="register.html" class="btn btn-primary">რეგისტრაცია</a>
        </div>
        <div class="welcome" id="welcome-header" style="display: none">
          <span id="welcome-name"></span>
          <button id="logout-btn" class="btn logout">გასვლა</button>
        </div>
      </div>
    </header>

    <section class="auth-section">
      <div class="container">
        <h2>რეგისტრაცია</h2>

        <form id="register-form" class="auth-form">
          <input type="text" id="firstName" placeholder="სახელი" required />
          <input type="text" id="lastName" placeholder="გვარი" required />
          <input
            type="tel"
            id="phoneNumber"
            placeholder="ტელეფონის ნომერი"
            required
          />
          <input type="email" id="email" placeholder="ელ. ფოსტა" required />
          <input
            type="password"
            id="password"
            placeholder="პაროლი (მინიმუმ 6 სიმბოლო)"
            required
            minlength="6"
          />
          <select id="role" class="auth-select">
            <option value="User">მომხმარებელი</option>
            <option value="Admin">ადმინისტრატორი</option>
          </select>
          <button type="submit" class="btn btn-primary">დარეგისტრირება</button>
          <div id="registerMessage" class="auth-message"></div>
        </form>

        <p class="switch-text">
          უკვე გაქვს ანგარიში?
          <a href="login.html">შესვლა</a>
        </p>
      </div>
    </section>

    <footer class="site-footer">
      <div class="container">
        <p>© 2026 HotelBook — სტუდენტური პროექტი - ლიკა საბაშვილი</p>
      </div>
    </footer>

    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="register.js"></script>
  </body>
</html>
